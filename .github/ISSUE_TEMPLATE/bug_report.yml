name: Bug Report
description: Report a bug in Imara
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Thanks for reporting a bug! Please fill out the details below.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the issue.
      placeholder: |
        1. Run `imara wrap`
        2. Start an agent session
        3. ...
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Imara version
      placeholder: "0.1.0"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Linux
        - Windows
    validations:
      required: true

  - type: input
    id: node-version
    attributes:
      label: Node.js version
      placeholder: "20.x"

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste any error output or logs.
      render: shell
